version: "3.9"

# ============================================================
# ФрешМаркет — Local Microservices Deployment
#
# Services:
#   frontend  — React SPA served by Nginx         → http://localhost:3000
#   api       — Express REST API                  → http://localhost:8080
#
# External dependency:
#   Supabase  — Auth, Database, Edge Functions    (cloud, configured via .env)
#
# Usage:
#   cp .env.example .env      # fill in your Supabase credentials
#   docker compose up --build
# ============================================================

services:

  # ----------------------------------------------------------
  # Frontend microservice
  # Builds the Vite app and serves it via Nginx.
  # Supabase credentials are baked in at build time (VITE_ vars).
  # ----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - freshmarket

  # ----------------------------------------------------------
  # API microservice
  # Express server compiled to a single JS bundle.
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - freshmarket
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  freshmarket:
    driver: bridge
