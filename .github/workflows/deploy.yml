name: Deploy FreshMarket

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4 # Обновил до v4, она стабильнее
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 🛠️ Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🏗️ Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_DADATA_TOKEN: ${{ secrets.VITE_DADATA_TOKEN }}
          PORT: 3000
          BASE_PATH: /  # <--- Добавь вот эту строчку (обычно это просто слэш)
        run: pnpm run build

      - name: 🚀 Deploy to Debian 11
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "193.222.97.28"
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # МЕНЯЕМ ПУТЬ ЗДЕСЬ:
          source: "artifacts/story-weaver/dist/**" 
          target: "/var/www/freshmarket"
          strip_components: 3
